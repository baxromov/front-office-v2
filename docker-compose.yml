services:
  # -- FastAPI application --
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LANGGRAPH_URL: http://langgraph-server:2024
      MONGO_URL: ${MONGO_URL}
      QDRANT_URL: ${QDRANT_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      REDIS_URL: ${REDIS_URL}
      # Disable all LangSmith/LangChain phone-home (corporate SSL blocks api.smith.langchain.com)
      LANGCHAIN_TRACING_V2: "false"
      LANGCHAIN_TRACING: "false"
      LANGSMITH_TRACING: "false"
      LANGSMITH_API_KEY: ""
      # Disable SSL verification for corporate network
      SSL_CERT_FILE: ""
      REQUESTS_CA_BUNDLE: ""
      CURL_CA_BUNDLE: ""
      PYTHONHTTPSVERIFY: "0"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # HuggingFace Hub (fastembed downloads ONNX models at runtime)
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_DOWNLOAD_TIMEOUT: "600"
      FASTEMBED_CACHE_PATH: /root/.cache/fastembed
    volumes:
      - model_cache:/root/.cache
    depends_on:
      - langgraph-server
    networks:
      - fop-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -- LangGraph Agent Server --
  langgraph-server:
    build:
      context: .
      dockerfile: Dockerfile.langgraph
    restart: unless-stopped
    ports:
      - "2024:2024"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      MONGO_URL: ${MONGO_URL}
      QDRANT_URL: ${QDRANT_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      REDIS_URL: ${REDIS_URL}
      # Disable all LangSmith/LangChain phone-home
      LANGCHAIN_TRACING_V2: "false"
      LANGCHAIN_TRACING: "false"
      LANGSMITH_TRACING: "false"
      LANGSMITH_API_KEY: ""
      LANGSMITH_ENDPOINT: ""
      LANGCHAIN_ENDPOINT: ""
      # Disable SSL verification for corporate network
      SSL_CERT_FILE: ""
      REQUESTS_CA_BUNDLE: ""
      CURL_CA_BUNDLE: ""
      PYTHONHTTPSVERIFY: "0"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # HuggingFace Hub (fastembed downloads ONNX models at runtime)
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_DOWNLOAD_TIMEOUT: "600"
      FASTEMBED_CACHE_PATH: /root/.cache/fastembed
      # Disable LangGraph OTLP exporter
      OTEL_TRACES_EXPORTER: "none"
    volumes:
      - model_cache:/root/.cache
    networks:
      - fop-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -- Frontend Dev Server (Vite) --
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm config set strict-ssl false && npm install && npx vite --host"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      VITE_API_PROXY: http://fastapi:8000
    depends_on:
      - fastapi
    networks:
      - fop-network

volumes:
  model_cache:
  frontend_node_modules:

networks:
  fop-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
      com.docker.network.bridge.name: br-fop
      com.docker.network.bridge.enable_ip_masquerade: "true"
