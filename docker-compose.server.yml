services:
  fastapi:
    image: front-office-v2-fastapi-img:latest
    ports:
      - "8001:8000"
    env_file:
      - .env
    networks:
      - fop-network

  langgraph-server:
    image: front-office-v2-langgraph-img:latest
    ports:
      - "2024:2024"
    env_file:
      - .env
    networks:
      - fop-network

  frontend:
    image: front-office-frontend-img:latest
    ports:
      - "3000:3000"
    working_dir: /app
    command: sh -c "npm install && npx vite --host"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    networks:
      - fop-network
    depends_on:
      - fastapi

networks:
  fop-network:
    driver: bridge

volumes:
  frontend_node_modules:
